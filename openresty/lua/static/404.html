<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Not Found</title>

  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }

    .code {
      font-size: 120px;
      font-weight: 800;
      letter-spacing: -5px;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 28px;
      margin: 0;
      color: #f1f5f9;
    }

    p {
      margin-top: 12px;
      font-size: 16px;
      color: #94a3b8;
      line-height: 1.6;
    }

    .hint {
      margin-top: 20px;
      font-size: 13px;
      color: #64748b;
    }

    .btn {
      margin-top: 25px;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #4f46e5;
      transform: translateY(-1px);
    }

    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(99, 102, 241, 0.2);
      filter: blur(120px);
      border-radius: 50%;
      top: -100px;
    }
  </style>
</head>

<body>
  <div class="glow"></div>

  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>
      The route you’re trying to access doesn’t exist or hasn’t been mapped yet.
      <br/>
      It might have been moved, or never existed.
    </p>


    <div class="hint">
      If you think this is a mistake, check your subdomain or routing config.
    </div>
  </div>
</body>
</html>
