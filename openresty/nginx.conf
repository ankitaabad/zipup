worker_processes auto;
env ENV;
env ACME_EMAIL;
events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 ipv6=off;
    lua_package_path "/lua/?.lua;;"; 
    include       mime.types;
    default_type  application/octet-stream;
    error_log /dev/stdout info;
    access_log /dev/stdout;
    client_body_buffer_size 256k;
    proxy_buffers 32 128k;       
    proxy_buffer_size 64k;
    proxy_busy_buffers_size 128k;
    proxy_max_temp_file_size 256m;
    # Shared memory for Lua routing table
    lua_shared_dict routes 1m;
    lua_shared_dict whitelist_domains 1m;
    lua_shared_dict acme 16m;
    # SSL certificate verification for Let's Encrypt API
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_ssl_verify_depth 2;

    # DNS resolver for upstreams inside Docker

    init_by_lua_block {
        local email = os.getenv("ACME_EMAIL")
        local utils = require("internal_utils")
        if not email or email == "" then
            error("ACME_EMAIL is not set")
        end
        require("resty.acme.autossl").init({
            -- setting the following to true
            -- implies that you read and accepted https://letsencrypt.org/repository/
            tos_accepted = true,
            -- uncomment following for first time setup
            staging = true,
            -- uncomment following to enable RSA + ECC double cert
            -- domain_key_types = { 'rsa', 'ecc' },
            -- uncomment following to enable tls-alpn-01 challenge
            -- enabled_challenge_handlers = { 'http-01' },
      
            cache_size = 100,
            renew_threshold = 7 * 86400,
            -- interval to check cert renewal, in seconds
            renew_check_interval = 6 * 3600,
            storage_adapter = "file",
            storage_config = {
                dir = '/etc/ssl/storage',
            },
            account_key_path = "/etc/openresty/account.key",
            account_email = email,
            domain_whitelist_callback = function(domain, is_new_cert_needed)
              ngx.log(ngx.INFO, "SSL request for domain: ", domain,
                  " | new cert needed: ", tostring(is_new_cert_needed))

              if not domain or domain == "" then
                  ngx.log(ngx.ERR, "Empty domain received in ACME callback")
                  return false
              end

              -- normalize (same as your helper expects)
              domain = string.lower(domain)
              if utils.is_whitelisted_domain(domain) then
                  return true
              end

              ngx.log(ngx.WARN, "Domain not whitelisted: ", domain)
              return false
          end
        })
    }
    # Initialize Lua on worker start (load routes etc.)
    init_worker_by_lua_file /lua/init.lua;
    server {
        listen 9090;

        location = /__proxy__/reload {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            content_by_lua_file /lua/reload.lua;
        }
    }
    server {
        listen 8080;
        listen 80;
        listen 443 ssl;
        server_name _;
        set $upstream "";
        set $upstream_uri "";
        error_page 404 /404.html;
        resolver 127.0.0.11 ipv6=off;

        location = /404.html {
            alias /lua/static/404.html;
        }
        # Catch-all entry point, Lua router decides
        location / {
            access_by_lua_file /lua/router.lua;
        }
                # fallback certs, make sure to create them before hand
        ssl_certificate /etc/openresty/default.pem;
        ssl_certificate_key /etc/openresty/default.key;

        ssl_certificate_by_lua_block {
            ngx.log(ngx.ERR, "[DEBUG] worker id (SSL)=", ngx.worker.id())
            ngx.log(ngx.ERR, "[ACME][SSL] certificate phase triggered")
            ngx.log(ngx.ERR, "[ACME][SSL] host=", ngx.var.host)

            local acme = require("resty.acme.autossl")
            local dict = ngx.shared.acme
            ngx.log(ngx.ERR, "[ACME][SHM KEYS] ", table.concat(dict:get_keys(50), ", "))
            local ok, err = acme.ssl_certificate()

            ngx.log(ngx.ERR, "[ACME][SSL] ssl_certificate result: ", ok, " err: ", err)
        }

        location ^~ /.well-known/acme-challenge/ {
            content_by_lua_block {
                ngx.log(ngx.ERR, "[DEBUG] worker id (HTTP)=", ngx.worker.id())
                ngx.log(ngx.ERR, "[ACME][HTTP] challenge hit URI: ", ngx.var.uri)
                ngx.log(ngx.ERR, "[ACME][HTTP] host: ", ngx.var.host)
                ngx.log(ngx.ERR, "[ACME][HTTP] args: ", ngx.var.args)

                local acme = require("resty.acme.autossl")

                ngx.log(ngx.ERR, "[ACME][HTTP] calling serve_http_challenge")
                acme.serve_http_challenge()

                ngx.log(ngx.ERR, "[ACME][HTTP] serve_http_challenge returned")
            }
        }
        # Static artifacts handler (used by router.lua)
        location /static/ {
            internal;                                 # only accessible via ngx.exec()
            alias /static_artifacts/;       # volume mounted for static artifacts
            try_files $uri $uri/index.html =404;
            # Optional caching headers
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }

        # Dynamic proxy handler (used by router.lua)
        location @dynamic_proxy {
            internal;                       # only accessible via ngx.exec()
            proxy_pass $upstream$upstream_uri;  # overridden in Lua
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Zipup-Internal-Source "";
        }
    }
}
