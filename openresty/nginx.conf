worker_processes auto;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/lua/?.lua;;"; 
    include       mime.types;
    default_type  application/octet-stream;
    error_log /dev/stdout info;
    access_log /dev/stdout;
    # Shared memory for Lua routing table
    lua_shared_dict routes 1m;
    lua_shared_dict whitelist_domains 1m;

    # DNS resolver for upstreams inside Docker
    resolver 127.0.0.11 ipv6=off;

    # Initialize Lua on worker start (load routes etc.)
    init_worker_by_lua_file /lua/init.lua;
    server {
        listen 9090;

        location = /__proxy__/reload {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            content_by_lua_file /lua/reload.lua;
        }
    }
    server {
        listen 8080;
        listen 80;
        # listen 443 ssl;
        server_name _;
        set $upstream "";
        set $upstream_uri "";

        # Catch-all entry point, Lua router decides
        location / {
            access_by_lua_file /lua/router.lua;
        }

        # Static artifacts handler (used by router.lua)
        location /static/ {
            internal;                                 # only accessible via ngx.exec()
            alias /static_artifacts/;       # volume mounted for static artifacts
            try_files $uri $uri/index.html =404;
            # Optional caching headers
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }

        # Dynamic proxy handler (used by router.lua)
        location @dynamic_proxy {
            internal;                       # only accessible via ngx.exec()
             proxy_pass $upstream$upstream_uri;  # overridden in Lua
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Zipup-Internal-Source "";
        }
    }
}
