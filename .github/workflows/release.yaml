name: Create Tag and Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Fetch tags
      - name: Fetch all tags
        run: git fetch --tags

      # 3️⃣ Get latest tag
      - name: Get latest tag
        id: latest
        run: |
          TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n 1)
          echo "latest=$TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $TAG"

      # 4️⃣ Compute next version
      - name: Compute next version
        id: next
        run: |
          LATEST="${{ steps.latest.outputs.latest }}"

          if [ -z "$LATEST" ]; then
            MAJOR=0
            MINOR=0
            PATCH=0
          else
            VERSION=${LATEST#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          fi

          case "${{ github.event.inputs.bump }}" in
            patch)
              PATCH=$((PATCH+1))
              ;;
            minor)
              MINOR=$((MINOR+1))
              PATCH=0
              ;;
            major)
              MAJOR=$((MAJOR+1))
              MINOR=0
              PATCH=0
              ;;
          esac

          NEXT="v$MAJOR.$MINOR.$PATCH"
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT"

      # 5️⃣ Push tag only once (avoid race between matrix jobs)
      - name: Create and push tag
        if: matrix.arch == 'x64'
        env:
          PAT: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next.outputs.next }}"
          git push https://x-access-token:${PAT}@github.com/${{ github.repository }}.git "${{ steps.next.outputs.next }}"

      # 6️⃣ Setup pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      # 7️⃣ Setup Node
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      # 8️⃣ Install dependencies
      - run: pnpm install --frozen-lockfile

      # 9️⃣ Build release
      - name: Run release script
        run: ./release.sh

      # 🔟 Package release
      - name: Package release
        run: |
          cd release
          TAG=${{ steps.next.outputs.next }}
          tar -czf ../myapp-${TAG}-linux-${{ matrix.arch }}.tar.gz .

      # 1️⃣1️⃣ Upload artifact to release
      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next.outputs.next }}
          files: myapp-${{ steps.next.outputs.next }}-linux-${{ matrix.arch }}.tar.gz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
