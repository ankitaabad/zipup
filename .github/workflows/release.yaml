name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags

      - id: next
        run: |
          TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            VERSION=${TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          fi

          case "${{ github.event.inputs.bump }}" in
            patch) PATCH=$((PATCH+1)) ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
          esac

          NEXT="v$MAJOR.$MINOR.$PATCH"
          echo "tag=$NEXT" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          TAG=${{ steps.next.outputs.tag }}
          IMAGE=ghcr.io/${{ github.repository_owner }}/zipup

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -t $IMAGE:$TAG \
            -t $IMAGE:latest \
            --push \
            .

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run release script
        run: ./release.sh

      - name: Generate env file
        run: |
          TAG=${{ steps.next.outputs.tag }}
          echo "ZIPUP_VERSION=$TAG" > release/.env
          
      - name: Package release
        run: |
          cd release
          TAG=${{ steps.next.outputs.tag }}
          tar -czf ../zipup-${TAG}.tar.gz .

      - name: Push tag
        env:
          PAT: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.next.outputs.tag }}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$TAG"
          git push https://x-access-token:${PAT}@github.com/${{ github.repository }}.git "$TAG"

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next.outputs.tag }}
          files: zipup-${{ steps.next.outputs.tag }}.tar.gz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}




