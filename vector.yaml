sources:
  passup:
    type: "docker_logs"
    include_containers:
      - "passup-passup-1"
sinks:
  vlogs:
    inputs:
      - passup
    type: elasticsearch
    endpoints:
      - http://victorialogs:9428/insert/elasticsearch/
    api_version: v8
    compression: gzip
    healthcheck:
      enabled: false
    query:
      _msg_field: message
      _time_field: timestamp
      _stream_fields: host,container_name
