sources:
  zipup:
    type: file
    include:
      - /var/lib/docker/containers/*/*-json.log
    read_from: beginning
    ignore_older: 600

transforms:
  parse_zipup_json:
    type: remap
    inputs: ["zipup"]
    source: |
      .docker = parse_json!(.message)
      if (.docker == null){
        abort
      }
      appName = .docker.attrs.appName
      appType = .docker.attrs.appType
      .parsed,err = parse_json(strip_whitespace!(.docker.log))
      if err != null {
        message = strip_whitespace!(.docker.log)
        del(.)
        .message = message
      } else {
        . = .parsed
      }
      ._stream = appName
      .appName = appName
      .appType = appType
      ._msg = .message
      del(.message)


sinks:
  vlogs:
    type: elasticsearch
    inputs:
      - parse_zipup_json
    endpoints:
      - http://victorialogs:9428/insert/elasticsearch/
    api_version: v8
    compression: gzip
    healthcheck:
      enabled: false
    query:
      _msg_field: _msg
      _time_field: timestamp
      _stream_fields: _stream
