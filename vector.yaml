sources:
  paasup:
    type: "docker_logs"
    include_containers:
      - "paasup"


transforms:
  parse_paasup_json:
    type: "remap"
    inputs: ["paasup"]
    source: |
      . = parse_json!(.message)

sinks:
  vlogs:
    inputs:
      - parse_paasup_json
    type: elasticsearch
    endpoints:
      - http://victorialogs:9428/insert/elasticsearch/
    # encoding:
    #   codec: "json"
    api_version: v8
    compression: gzip
    healthcheck:
      enabled: false
    query:
      _msg_field: message
      _time_field: timestamp
      _stream_fields: host,container_name
