# version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - redis_network
      - wireguard_network          # 🔐 VPN access
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    labels:
      - app_type=system
      - app_name=redis
    logging:
      driver: none

  openresty:
    build:
      context: ./openResty
      dockerfile: Dockerfile
    container_name: openresty
    ports:
      - "8080:8080"
    volumes:
      - ./openResty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./openResty/lua:/lua:ro
      - ./config:/config:ro
      - static_artifacts:/static_artifacts
    networks:
      - zipup_network
      - openresty_network
      - redis_network
    restart: unless-stopped
    depends_on:
      - zipup
    labels:
      - app_type=system
      - app_name=openresty
    logging:
      driver: none

  zipup:
    image: node:20-bookworm-slim
    container_name: zipup
    working_dir: /app
    restart: unless-stopped
    user: root
    networks:
      - zipup_network
      - redis_network
    volumes:
      - ./app/backend:/app:ro
      - zipup_data:/data
      - static_artifacts:/static_artifacts
      - dynamic_artifacts:/dynamic_artifacts
      - secrets:/secrets
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["node", "dist/index.js"]
    environment:
      - NODE_ENV=production
    ports:
      - "3000:8080"
    labels:
      - app_type=system
      - app_name=zipup
    logging:
      driver: "json-file"
      options:
        labels: "app_name"
    depends_on:
      - vector

  vector:
    image: timberio/vector:0.38.X-alpine
    user: root
    volumes:
      - ./vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: /var/lib/docker
        target: /var/lib/docker
    ports:
      - "8686:8686"
    depends_on:
      - victorialogs
    labels:
      - app_type=system
      - app_name=vector

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: victorialogs
    ports:
      - "9428:9428"
    command:
      - "--storageDataPath=/vlogs"
    volumes:
      - vldata:/vlogs
    networks:
      - zipup_network
      - wireguard_network          # 🔐 VPN access
    labels:
      - app_type=system
      - app_name=victorialogs
    logging:
      driver: none

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - postgres_network
      - wireguard_network          # 🔐 VPN access
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: zipup
      POSTGRES_USER: zipup
      POSTGRES_PASSWORD: zipup
    ports:
      - "5432:5432"
    labels:
      - app_type=system
      - app_name=postgres

  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SERVERPORT=51820
      - PEERS=1
      - PEERDNS=auto
    volumes:
      - wireguard_config:/config
      - /lib/modules:/lib/modules
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - wireguard_network
    labels:
      - app_type=system
      - app_name=wireguard

volumes:
  vldata:
  zipup_data:
  redis_data:
  static_artifacts:
  dynamic_artifacts:
  secrets:
  postgres_data:
  wireguard_config:

networks:
  zipup_network:
    driver: bridge
  openresty_network:
    driver: bridge
  redis_network:
    driver: bridge
  postgres_network:
    driver: bridge
  wireguard_network:
    driver: bridge