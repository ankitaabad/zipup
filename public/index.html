<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --accent: #38bdf8;
            --text: #e5e7eb;
            --muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #020617, #020617 60%, #0f172a);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: var(--card);
            padding: 3rem;
            border-radius: 14px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        p {
            font-size: 1.1rem;
            color: var(--muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        a.button {
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .primary {
            background: var(--accent);
            color: #020617;
        }

        .primary:hover {
            background: #0ea5e9;
        }

        .secondary {
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .secondary:hover {
            background: rgba(56,189,248,0.1);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 It Works!</h1>
        <p>
            Your web server is running successfully.<br>
            This page is served using a simple <code>index.html</code> file.
        </p>

        <div class="buttons">
            <a href="#" class="button primary">Get Started</a>
            <a href="https://caddyserver.com/docs/" class="button secondary" target="_blank">
                Caddy Docs
            </a>
        </div>

        <footer>
            © 2025 • Powered by Caddy
        </footer>
    </div>
</body>
</html>
