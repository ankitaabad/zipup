# nginx.conf
worker_processes auto;


events {
    worker_connections 1024;
}

http {
    error_log /dev/stdout info;
    access_log /dev/stdout;
    # Shared memory for Lua routing table
    lua_shared_dict routes 20m;

    # DNS resolver for upstreams inside Docker
    resolver 127.0.0.11 ipv6=off;

    # Initialize Lua on worker start (load routes etc.)
    init_worker_by_lua_file /lua/init.lua;

    server {
        listen 8080;
        server_name _;

        # Route reload endpoint
        location /__reload {
            content_by_lua_file /lua/reload.lua;
        }

        # Catch-all entry point
        location / {
            # access_by_lua_file /lua/router.lua;
                proxy_pass http://passup:3000;
        }

        # Static content handler (used by router.lua)
        location /static/ {
            internal;                       # prevent direct access from outside
            alias /data/sites/;             # root directory for static apps
            try_files $uri /index.html =404;

            # Disable caching (helpful in dev)
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }

        # Dynamic proxy handler (used by router.lua)
        location /dynamic/ {
            internal;                       # prevent direct access from outside
            proxy_pass http://127.0.0.1:1;  # placeholder, overridden in Lua
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
