<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logo Loader - Progress Bar</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: system-ui, sans-serif;
      color: #e2e8f0;
    }

    .container {
      text-align: center;
    }

    .logo {
      width: 64px;
      margin-bottom: 20px;
      opacity: 0.95;
    }

    .bar {
      width: 140px;
      height: 4px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
      margin: 0 auto;
      position: relative;
    }

    .bar::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;

      width: 40%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        #38bdf8,
        transparent
      );

      border-radius: 999px;
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(250%);
      }
    }

    .label {
      margin-top: 14px;
      font-size: 13px;
      opacity: 0.6;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="./logo.svg" alt="Logo" class="logo" />
    <div class="bar"></div>
    <div class="label">Loading...</div>
  </div>
</body>
</html>
