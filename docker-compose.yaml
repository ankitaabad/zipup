# version: "3.8"

services:
  openresty:
    build:
      context: ./openresty
      dockerfile: Dockerfile
    container_name: openresty
    ports:
      - "8080:8080"
    volumes:
      - ./openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./openresty/lua:/lua:ro
      - ./config:/config:ro
      - static_artifacts:/static_artifacts

      # - ./sites:/data/sites:ro
    networks:
      - passup_network
    restart: unless-stopped
    depends_on:
      - passup
  passup:
    image: node:24-alpine
    working_dir: /app
    container_name: passup
    networks:
      - passup_network
    volumes:
      - ./:/app # <-- mount CURRENT directory
      - /app/node_modules
      - ./config:/config
      - passup_data:/data
      - static_artifacts:/static_artifacts
    command: sh -c "npm install  && npm run dev"
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"

    # logging:
    #   driver: "none"   # disable default Docker logging → Vector will handle logs
    depends_on:
      - vector

  vector:
    image: timberio/vector:0.38.X-alpine
    volumes:
      - ./vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: /var/lib/docker
        target: /var/lib/docker
    ports:
      - "8686:8686" # Vector internal API (optional)
    depends_on:
      - victorialogs
    user: root
  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: victorialogs
    ports:
      - "9428:9428" # VictoriaLogs HTTP ingestion + query
    command:
      - "--storageDataPath=/vlogs"
    volumes:
      - vldata:/vlogs
volumes:
  vldata:
  passup_data:
  static_artifacts:
  dynamic_artifacts:
networks:
  passup_network:
    driver: bridge
